name: sothea-biometrics
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: sothea
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - '5433:5432'
    command: postgres -c listen_addresses='*'
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./sql:/docker-entrypoint-initdb.d:z
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sothea']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../Sothea-Backend
    ports:
      - ${BACKEND_PORT:-3333}:3000
    environment:
      PORT: 3000
      SECRET_KEY: ${SECRET_KEY:-aedbfcbbaffa2a82eff7b2bcac561afb}
      DATABASE_URL: postgres://postgres:postgres123@postgres:5432/sothea
      TIMEZONE: Asia/Phnom_Penh
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../Sothea-Frontend
      args:
        VITE_API_URL: ${API_URL:-http://localhost:3001/api}
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  postgres-data:
